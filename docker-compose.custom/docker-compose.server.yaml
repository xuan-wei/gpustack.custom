# Custom GPUStack server — local build, never pushed to a registry.
#
# Run from the workspace root:
#   docker compose -f docker-compose.custom/docker-compose.server.yaml \
#                  --env-file docker-compose.custom/.env up -d
#
# Build only:
#   docker compose -f docker-compose.custom/docker-compose.server.yaml \
#                  --env-file docker-compose.custom/.env build

services:
  gpustack-server:
    build:
      context: ..
      dockerfile: docker-compose.custom/Dockerfile.custom
      args:
        OFFICIAL_TAG: ${OFFICIAL_TAG:-v2.1.2}
    image: gpustack-custom:${OFFICIAL_TAG:-v2.1.2}
    container_name: gpustack-server
    restart: unless-stopped
    network_mode: bridge
    ports:
      - "${GPUSTACK_API_PORT:-80}:80"
    volumes:
      - ${GPUSTACK_DATA_DIR_HOST:-../gpustack-data}:/var/lib/gpustack
      - ${GPUSTACK_CACHE_DIR_HOST:-../gpustack-cache}:/var/cache/gpustack
      - ${MODEL_SCOPE_PATH_HOST:-../gpustack-cache/modelscope}:/modelscope-cache
      - ${MODEL_CATALOG_HOST:-../gpustack/gpustack/assets/model-catalog-modelscope.yaml}:/gpustack-assets/model-catalog-modelscope.yaml:ro
    environment:
      HF_ENDPOINT: ${HF_ENDPOINT:-https://hf-mirror.com}
    command:
      - --data-dir=/var/lib/gpustack
      - --cache-dir=/var/cache/gpustack
      - --gateway-mode=${GPUSTACK_GATEWAY_MODE:-auto}
      - --api-port=${GPUSTACK_API_PORT:-80}
      - --disable-worker
      - --bootstrap-password=${GPUSTACK_BOOTSTRAP_PASSWORD}
      - --model-catalog-file=/gpustack-assets/model-catalog-modelscope.yaml
      - --model-scope-path=/modelscope-cache
