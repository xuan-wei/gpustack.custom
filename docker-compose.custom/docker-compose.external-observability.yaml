# External observability stack for custom GPUStack deployment.
#
# Use together with docker-compose.server.yaml:
#   docker compose \
#     -f docker-compose.custom/docker-compose.server.yaml \
#     -f docker-compose.custom/docker-compose.external-observability.yaml \
#     --env-file deploy/.env up -d
#
# Note: gpustack-server uses network_mode: host, so prometheus reaches it
# via host.docker.internal (mapped to the host gateway in extra_hosts below).

services:
  gpustack-server:
    environment:
      - GPUSTACK_DISABLE_BUILTIN_OBSERVABILITY=true
      - GPUSTACK_GRAFANA_URL=${GPUSTACK_GRAFANA_URL:?set GPUSTACK_GRAFANA_URL to the browser-reachable Grafana URL}

  prometheus:
    image: ${IMAGE_REGISTRY:-docker.io}/prom/prometheus:${PROMETHEUS_TAG:-latest}
    container_name: gpustack-prometheus
    restart: unless-stopped
    extra_hosts:
      - "host.docker.internal:host-gateway"               # reach gpustack-server on host network
    ports:
      - "${PROMETHEUS_PORT:-9090}:9090"
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--web.enable-remote-write-receiver'
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prom_data:/prometheus

  grafana:
    image: ${IMAGE_REGISTRY:-docker.io}/grafana/grafana:${GRAFANA_TAG:-latest}
    container_name: gpustack-grafana
    restart: unless-stopped
    ports:
      - "${GRAFANA_PORT:-3000}:3000"
    environment:
      - GF_SERVER_HTTP_PORT=3000
      - GF_SECURITY_ADMIN_USER=${GRAFANA_ADMIN_USER:-admin}
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD:-grafana}
      - GF_FEATURE_TOGGLES_ENABLE=flameGraph traceqlSearch traceQLStreaming correlations metricsSummary traceqlEditor traceToMetrics traceToProfiles
    volumes:
      - ./grafana/grafana_provisioning:/etc/grafana/provisioning:ro
      - ./grafana/grafana_dashboards:/etc/dashboards:ro

volumes:
  prom_data: {}
