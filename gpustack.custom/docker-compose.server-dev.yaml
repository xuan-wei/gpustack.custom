# Custom GPUStack server+worker (dev) — runs alongside the existing production
# deployment on the same host by offsetting all ports.
#
# Run from the workspace root:
#   docker compose -f gpustack.custom/docker-compose.server-dev.yaml \
#                  --env-file gpustack.custom/.env up -d
#
# Build only:
#   docker compose -f gpustack.custom/docker-compose.server-dev.yaml \
#                  --env-file gpustack.custom/.env build

services:
  gpustack-server-dev:
    build:
      context: ..
      dockerfile: gpustack.custom/Dockerfile.custom
      args:
        OFFICIAL_TAG: ${OFFICIAL_TAG:-v2.1.2}
    image: gpustack-custom:${OFFICIAL_TAG:-v2.1.2}
    container_name: gpustack-server-dev
    restart: unless-stopped
    privileged: true
    network_mode: host
    runtime: nvidia
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ${GPUSTACK_DATA_DIR_HOST:-../gpustack-data}:/var/lib/gpustack
      - ${GPUSTACK_CACHE_DIR_HOST:-../gpustack-cache}:/var/cache/gpustack
      - ${HF_CACHE_DIR_HOST:-/data/shared/huggingface/hub}:/var/cache/gpustack/huggingface
      - ${MODEL_SCOPE_PATH_HOST:-/data/shared/modelscope/hub/models}:/modelscope-cache
    environment:
      HF_ENDPOINT: ${HF_ENDPOINT:-https://hf-mirror.com}
      CUDA_DEVICE_ORDER: PCI_BUS_ID
    command:
      - --data-dir=/var/lib/gpustack
      - --cache-dir=/var/cache/gpustack
      - --port=${GPUSTACK_API_PORT:-28080}
      - --worker-port=${GPUSTACK_WORKER_PORT:-20150}
      - --metrics-port=${GPUSTACK_METRICS_PORT:-20161}
      - --worker-metrics-port=${GPUSTACK_WORKER_METRICS_PORT:-20151}
      - --service-port-range=${GPUSTACK_SERVICE_PORT_RANGE:-50000-50063}
      - --api-port=${GPUSTACK_INTERNAL_API_PORT:-30080}
      - --builtin-prometheus-port=${GPUSTACK_BUILTIN_PROMETHEUS_PORT:-29090}
      - --builtin-grafana-port=${GPUSTACK_BUILTIN_GRAFANA_PORT:-23000}
      - --gateway-mode=${GPUSTACK_GATEWAY_MODE:-auto}
      - --enable-worker
      - --bootstrap-password=${GPUSTACK_BOOTSTRAP_PASSWORD}
